name: Build plugins

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout emfe_plugins
        uses: actions/checkout@v4
        # Uses the default GITHUB_TOKEN (scoped to this repo), so the
        # SUBMODULE_READ_TOKEN PAT only needs Contents:read on the
        # *upstream* repos (em6809, Em68030_WinUI3Cpp).

      - name: Fetch submodules (em6809, Em68030_WinUI3Cpp)
        env:
          SUBMODULE_READ_TOKEN: ${{ secrets.SUBMODULE_READ_TOKEN }}
        shell: bash
        run: |
          # Use the PAT for *any* github.com clone, limited to this job.
          # If the secret is empty (all upstream repos already public),
          # fall through and rely on the ambient credentials.
          if [[ -n "${SUBMODULE_READ_TOKEN}" ]]; then
            git config --global url."https://x-access-token:${SUBMODULE_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          git submodule update --init --recursive

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build mc6809 (Rust)
        working-directory: mc6809
        run: cargo build --release

      - name: Configure & build em8 (CMake)
        working-directory: em8
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build mc68030 (CMake)
        working-directory: mc68030
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build z8000 (CMake)
        working-directory: z8000
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Collect plugin DLLs
        shell: bash
        run: |
          mkdir -p dist
          cp mc6809/target/release/emfe_plugin_mc6809.dll dist/
          cp em8/build/bin/Release/emfe_plugin_em8.dll dist/
          cp mc68030/build/bin/Release/emfe_plugin_mc68030.dll dist/
          cp z8000/build/bin/Release/emfe_plugin_z8000.dll dist/
          ls -l dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: emfe-plugins-${{ github.sha }}
          path: dist/*.dll
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: emfe-plugins-*
          merge-multiple: true
          path: dist

      - name: Package
        run: |
          cd dist
          zip ../emfe-plugins-${{ github.ref_name }}.zip *.dll
          ls -l ../emfe-plugins-*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: emfe-plugins-*.zip
          generate_release_notes: true
