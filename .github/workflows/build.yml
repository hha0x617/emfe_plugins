name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout emfe_plugins
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch submodules (em6809, Em68030_WinUI3Cpp)
        env:
          SUBMODULE_READ_TOKEN: ${{ secrets.SUBMODULE_READ_TOKEN }}
        shell: bash
        run: |
          # Use a PAT for github.com clones so private upstream repos
          # (em6809, Em68030_WinUI3Cpp) are reachable.  Remove the
          # secret once both upstream repos are public — falls through
          # to ambient credentials.
          if [[ -n "${SUBMODULE_READ_TOKEN}" ]]; then
            git config --global url."https://x-access-token:${SUBMODULE_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          git submodule update --init --recursive

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            # `git describe` errors when no tag exists yet — don't fail the step.
            try {
              $desc = & git describe --tags --abbrev=0 2>$null
              if ($LASTEXITCODE -eq 0 -and $desc -match "^v(.+)$") {
                $ver = $Matches[1]
              }
            } catch {}
            $global:LASTEXITCODE = 0
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build mc6809 (Rust)
        working-directory: mc6809
        run: cargo build --release

      - name: Configure & build em8 (CMake)
        working-directory: em8
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build mc68030 (CMake)
        working-directory: mc68030
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build z8000 (CMake)
        working-directory: z8000
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Collect plugin DLLs
        shell: bash
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          # Stage under dist/plugins/ so the release zip can be
          # extracted next to emfe.exe without further rearrangement.
          mkdir -p dist/plugins
          cp mc6809/target/release/emfe_plugin_mc6809.dll dist/plugins/
          cp em8/build/bin/Release/emfe_plugin_em8.dll dist/plugins/
          cp mc68030/build/bin/Release/emfe_plugin_mc68030.dll dist/plugins/
          cp z8000/build/bin/Release/emfe_plugin_z8000.dll dist/plugins/
          ls -l dist/plugins/

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          # Inno Setup 6 is preinstalled on windows-latest runners; iscc is on PATH.
          # Pass APP_VERSION so the setup.exe filename and embedded version match
          # the release tag (or 0.0.0 for non-tag PR/dispatch runs).
          iscc /DAppVersion=${{ steps.version.outputs.APP_VERSION }} installer\emfe_plugins.iss
          Get-ChildItem dist\

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe-plugins-${{ env.SHORT_HASH }}
          path: dist/plugins/*.dll
          if-no-files-found: error

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: emfe-plugins-installer-${{ env.SHORT_HASH }}
          path: dist/emfe_plugins-*-setup.exe
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="emfe-plugins-${TAG}-${SHORT_HASH}.zip"
          # Zip the `plugins/` directory (not its contents) so the
          # archive holds `plugins/*.dll` paths — extractable directly
          # next to emfe.exe.
          cd dist
          7z a -tzip "../${ZIP}" plugins > /dev/null
          cd ..
          echo "ZIP_NAME=${ZIP}" >> "$GITHUB_ENV"
          ls -l "${ZIP}"
          echo "--- zip contents ---"
          7z l "${ZIP}"

      - name: Virus scan release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Write-Host "Scanning release artifacts with Windows Defender..."
          # Signature update is best-effort; transient runner failures
          # should not block the release.
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          # Resolve installer setup.exe path (filename embeds APP_VERSION).
          $setupExe = Get-ChildItem dist\emfe_plugins-*-setup.exe | Select-Object -First 1
          if (-not $setupExe) {
            Write-Error "setup.exe not found under dist\"
            exit 1
          }
          echo "SETUP_EXE_NAME=$($setupExe.Name)" >> $env:GITHUB_ENV
          echo "SETUP_EXE_PATH=$($setupExe.FullName)" >> $env:GITHUB_ENV
          Start-MpScan -ScanType CustomScan -ScanPath "$PWD\${env:ZIP_NAME}"
          Start-MpScan -ScanType CustomScan -ScanPath "$($setupExe.FullName)"
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Delete existing release if tag was moved to a new commit.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "${ZIP_NAME}" "${SETUP_EXE_PATH}" --title "$TAG" --notes "$(cat <<EOF
          ## emfe_plugins ${TAG}

          Pre-built Windows x64 plugin DLLs for the emfe emulator frontend.

          ### Assets
          - **${SETUP_EXE_NAME}** — Inno Setup installer (recommended). Per-user, no admin / UAC elevation required. Auto-detects which host frontend (emfe_WinUI3Cpp / emfe_CsWPF) is installed and offers component-level selection.
          - **${ZIP_NAME}** — zip of the four plugin DLLs for manual install.

          ### DLLs (in either asset)
          - \`emfe_plugin_mc6809.dll\` — Motorola 6809 (wraps em6809 Rust crate)
          - \`emfe_plugin_mc68030.dll\` — Motorola 68030 (reuses em68030_WinUI3Cpp core)
          - \`emfe_plugin_z8000.dll\` — Zilog Z8000 family (Z8001/Z8002/Z8003/Z8004)
          - \`emfe_plugin_em8.dll\` — em8 minimal 8-bit CPU (ABI validation target)

          ### Installation

          **Option 1 (recommended) — Installer**
          Download \`${SETUP_EXE_NAME}\` and run it. Per-user install, no admin required. The installer copies the DLLs to:
          \`\`\`
          %LOCALAPPDATA%\\emfe_WinUI3Cpp\\plugins\\
          %LOCALAPPDATA%\\emfe_CsWPF\\plugins\\
          \`\`\`
          The host scans both the system \`plugins/\` directory next to \`emfe.exe\` and the per-user directory above; the per-user copy wins on filename collisions.

          **Option 2 — Manual zip**
          Extract \`${ZIP_NAME}\` into \`%LOCALAPPDATA%\\emfe_WinUI3Cpp\\\` and/or \`%LOCALAPPDATA%\\emfe_CsWPF\\\` — whichever host frontends ([emfe_WinUI3Cpp](https://github.com/hha0x617/emfe_WinUI3Cpp) / [emfe_CsWPF](https://github.com/hha0x617/emfe_CsWPF)) you have installed. The zip's top-level \`plugins/\` directory lands directly under each, matching what the installer produces. Example layout for emfe_WinUI3Cpp (the \`%LOCALAPPDATA%\\emfe_CsWPF\\\` tree is identical):
          \`\`\`
          %LOCALAPPDATA%\\emfe_WinUI3Cpp\\
          └── plugins\\
              ├── emfe_plugin_mc6809.dll
              ├── emfe_plugin_mc68030.dll
              ├── emfe_plugin_z8000.dll
              └── emfe_plugin_em8.dll
          \`\`\`
          No admin / UAC elevation required. The host also scans a system \`plugins/\` directory next to \`emfe.exe\`, so for portable / dev-built hosts you can extract there instead — but for installer-deployed hosts in \`%ProgramFiles%\\\` you would need admin to write there, so the per-user path above is the right default.

          ### Security
          - Virus scan: **Passed** (Windows Defender, signatures updated at build time; both setup.exe and zip scanned)

          ### Source Code (Apache-2.0 / MIT dual)
          - **Repository**: [emfe_plugins](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)

          Upstream CPU cores pinned via submodule:
          - [em6809](https://github.com/hha0x617/em6809) (MIT OR Apache-2.0)
          - [Em68030_WinUI3Cpp](https://github.com/hha0x617/Em68030_WinUI3Cpp) (Apache-2.0)
          EOF
          )"
