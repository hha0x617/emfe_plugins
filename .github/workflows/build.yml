name: Build and Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout emfe_plugins
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Fetch submodules (em6809, Em68030_WinUI3Cpp)
        env:
          SUBMODULE_READ_TOKEN: ${{ secrets.SUBMODULE_READ_TOKEN }}
        shell: bash
        run: |
          # Use a PAT for github.com clones so private upstream repos
          # (em6809, Em68030_WinUI3Cpp) are reachable.  Remove the
          # secret once both upstream repos are public — falls through
          # to ambient credentials.
          if [[ -n "${SUBMODULE_READ_TOKEN}" ]]; then
            git config --global url."https://x-access-token:${SUBMODULE_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi
          git submodule update --init --recursive

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $ver = "0.0.0"
          if ("${{ github.ref }}" -match "^refs/tags/v(.+)$") {
            $ver = $Matches[1]
          } else {
            # `git describe` errors when no tag exists yet — don't fail the step.
            try {
              $desc = & git describe --tags --abbrev=0 2>$null
              if ($LASTEXITCODE -eq 0 -and $desc -match "^v(.+)$") {
                $ver = $Matches[1]
              }
            } catch {}
            $global:LASTEXITCODE = 0
          }
          echo "APP_VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Build mc6809 (Rust)
        working-directory: mc6809
        run: cargo build --release

      - name: Configure & build em8 (CMake)
        working-directory: em8
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build mc68030 (CMake)
        working-directory: mc68030
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Configure & build z8000 (CMake)
        working-directory: z8000
        run: |
          cmake -S . -B build
          cmake --build build --config Release

      - name: Collect plugin DLLs
        shell: bash
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          echo "SHORT_HASH=${SHORT_HASH}" >> "$GITHUB_ENV"
          mkdir -p dist
          cp mc6809/target/release/emfe_plugin_mc6809.dll dist/
          cp em8/build/bin/Release/emfe_plugin_em8.dll dist/
          cp mc68030/build/bin/Release/emfe_plugin_mc68030.dll dist/
          cp z8000/build/bin/Release/emfe_plugin_z8000.dll dist/
          ls -l dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: emfe-plugins-${{ env.SHORT_HASH }}
          path: dist/*.dll
          if-no-files-found: error

      - name: Package release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          ZIP="emfe-plugins-${TAG}-${SHORT_HASH}.zip"
          cd dist
          7z a -tzip "../${ZIP}" *.dll > /dev/null
          cd ..
          echo "ZIP_NAME=${ZIP}" >> "$GITHUB_ENV"
          ls -l "${ZIP}"

      - name: Virus scan release zip
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Write-Host "Scanning release zip with Windows Defender..."
          # Signature update is best-effort; transient runner failures
          # should not block the release.
          try {
            Update-MpSignature -ErrorAction Stop
            Write-Host "Signatures updated."
          } catch {
            Write-Warning "Signature update failed (continuing with stale signatures): $_"
          }
          Start-MpScan -ScanType CustomScan -ScanPath "$PWD\${env:ZIP_NAME}"
          $threats = Get-MpThreatDetection 2>$null
          if ($threats) {
            Write-Error "Threat detected: $($threats | Format-List | Out-String)"
            exit 1
          }
          Write-Host "Scan passed: no threats detected."

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          # Delete existing release if tag was moved to a new commit.
          gh release delete "$TAG" --yes 2>/dev/null || true
          gh release create "$TAG" "${ZIP_NAME}" --title "$TAG" --notes "$(cat <<EOF
          ## emfe_plugins ${TAG}

          Pre-built Windows x64 plugin DLLs for the emfe emulator frontend.

          ### Assets
          - **${ZIP_NAME}** — zip containing the four plugin DLLs

          ### DLLs inside the zip
          - \`emfe_plugin_mc6809.dll\` — Motorola 6809 (wraps em6809 Rust crate)
          - \`emfe_plugin_mc68030.dll\` — Motorola 68030 (reuses em68030_WinUI3Cpp core)
          - \`emfe_plugin_z8000.dll\` — Zilog Z8000 family (Z8001/Z8002/Z8003/Z8004)
          - \`emfe_plugin_em8.dll\` — em8 minimal 8-bit CPU (ABI validation target)

          ### Installation
          Extract the zip and drop the DLLs into the \`plugins\\\` directory
          next to an emfe host executable (\`emfe.exe\` from
          [emfe_CsWPF](https://github.com/hha0x617/emfe_CsWPF) or
          [emfe_WinUI3Cpp](https://github.com/hha0x617/emfe_WinUI3Cpp)).

          ### Security
          - Virus scan: **Passed** (Windows Defender, signatures updated at build time)

          ### Source Code (Apache-2.0 / MIT dual)
          - **Repository**: [emfe_plugins](https://github.com/${{ github.repository }})
          - **Build workflow**: [.github/workflows/build.yml](https://github.com/${{ github.repository }}/blob/${TAG}/.github/workflows/build.yml)

          Upstream CPU cores pinned via submodule:
          - [em6809](https://github.com/hha0x617/em6809) (MIT OR Apache-2.0)
          - [Em68030_WinUI3Cpp](https://github.com/hha0x617/Em68030_WinUI3Cpp) (Apache-2.0)
          EOF
          )"
