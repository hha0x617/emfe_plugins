name: Feature request
description: Suggest a new plugin, new peripheral, ABI addition, or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New CPU plugin
        - New peripheral device in existing plugin
        - C ABI addition / change (api/)
        - Build / CI improvement
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation — what problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How should it work?  Be concrete where possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: textarea
    id: notes
    attributes:
      label: Additional context / references
      description: Datasheets, prior art, related issues, etc.
